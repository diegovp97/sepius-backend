version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sepius-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=sepius
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sepius_dev}
      - POSTGRES_DB=sepius
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sepius -d sepius"]
      interval: 10s
      timeout: 5s
      retries: 5

  sepius-api:
    build:
      context: .
      dockerfile: src/Sepius.API/Dockerfile
    container_name: sepius-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - TwitchApi__ClientId=${TWITCH_CLIENT_ID}
      - TwitchApi__ClientSecret=${TWITCH_CLIENT_SECRET}
      # Authorization Code Flow — user access token + refresh token para EventSub WebSocket
      - TwitchApi__UserAccessToken=${TWITCH_USER_ACCESS_TOKEN:-}
      - TwitchApi__RefreshToken=${TWITCH_REFRESH_TOKEN:-}
      - TwitchApi__RedirectUri=${TWITCH_REDIRECT_URI:-http://localhost}
      - Streamlink__OutputPath=/recordings
      - Monitor__PollingIntervalSeconds=120
      - Monitor__Channels__0=elttblue
      - Monitor__Channels__1=kick:elttblue
      - AllowedOrigins=${ALLOWED_ORIGINS:-http://localhost:4200}
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=sepius;Username=sepius;Password=${POSTGRES_PASSWORD:-sepius_dev}
    volumes:
      - recordings_data:/recordings
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  recordings_data:
    driver: local
  postgres_data:
    driver: local
